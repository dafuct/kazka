services:
  mysql:
    image: mysql:8.4
    container_name: kazkar-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: kazkar
      MYSQL_PASSWORD: kazkar
      MYSQL_DATABASE: kazkar
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "kazkar", "-pkazkar"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: kazkar-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DB_URL: jdbc:mysql://mysql:3306/kazkar
      DB_USER: kazkar
      DB_PASS: kazkar
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      UPLOADS_DIR: /app/uploads
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-not-configured}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-not-configured}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@kazka.local}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      MONTHLY_TALE_LIMIT: ${MONTHLY_TALE_LIMIT:-30}
    ports:
      - "8080:8080"
    volumes:
      # Mount at the Dockerfile's chowned VOLUME path (/app/uploads), matching prod.
      # A fresh named volume inherits ownership from the image dir at the mount path;
      # mounting at an un-prepared path (e.g. /uploads) makes it root-owned and the
      # non-root backend (uid 1001) cannot write PNGs. See wiki lesson.
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      # Repo-root context (not ./frontend) so the npm workspace lockfile + @kazka/shared resolve.
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysqldata: {}
  uploads: {}

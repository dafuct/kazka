services:
  mysql:
    image: mysql:8.4
    container_name: kazkar-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: kazkar
      MYSQL_PASSWORD: kazkar
      MYSQL_DATABASE: kazkar
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "kazkar", "-pkazkar"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  mysqldata: {}

services:
  postgres:
    image: postgres:16
    container_name: kazkar-postgres
    environment:
      POSTGRES_USER: kazkar
      POSTGRES_PASSWORD: kazkar
      POSTGRES_DB: kazkar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kazkar"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  pgdata: {}

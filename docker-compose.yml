services:
  mysql:
    image: mysql:8.4
    container_name: kazkar-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: kazkar
      MYSQL_PASSWORD: kazkar
      MYSQL_DATABASE: kazkar
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "kazkar", "-pkazkar"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: kazkar-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DB_URL: jdbc:mysql://mysql:3306/kazkar
      DB_USER: kazkar
      DB_PASS: kazkar
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      UPLOADS_DIR: /uploads
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-not-configured}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-not-configured}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@kazka.local}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      MONOBANK_TOKEN: ${MONOBANK_TOKEN:-}
      BILLING_SUCCESS_URL: ${BILLING_SUCCESS_URL:-http://localhost:5173/subscription/success}
      BILLING_CANCEL_URL: ${BILLING_CANCEL_URL:-http://localhost:5173/pricing?cancelled=1}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysqldata: {}
  uploads: {}

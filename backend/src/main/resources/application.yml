spring:
  application:
    name: kazkar
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/kazkar}
    username: ${DB_USER:kazkar}
    password: ${DB_PASS:kazkar}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  session:
    store-type: redis
    timeout: 14d
    redis:
      namespace: kazka:session
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: ${MAIL_STARTTLS_ENABLE:true}
      mail.smtp.starttls.required: ${MAIL_STARTTLS_ENABLE:true}
      mail.smtp.ssl.enable: ${MAIL_SSL_ENABLE:false}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:not-configured}
            client-secret: ${GOOGLE_CLIENT_SECRET:not-configured}
            scope: openid,email,profile
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: never
server:
  port: 8080
  reactive:
    session:
      cookie:
        same-site: lax
        secure: ${COOKIE_SECURE:false}
        http-only: true
kazka:
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:5173}
  # Despite the `huggingface` namespace, this block now configures Gemini (text/editor/scene)
  # and Fal.ai (images). The HF router was retired 2026-05-30 — see
  # wiki/lessons/hf-router-strict-mode-rejects-repetition-penalty.md. Env var names are
  # preserved (HF_*) to minimise Coolify churn; class rename can come later.
  huggingface:
    api-token: ${HUGGINGFACE_API_TOKEN:}           # holds GOOGLE_API_KEY value
    image-api-token: ${FAL_KEY:}                   # Fal.ai key for image generation
    text-model: ${HF_TEXT_MODEL:gemini-2.5-flash}
    editor-model: ${HF_EDITOR_MODEL:gemini-2.5-flash}
    image-model: ${HF_IMAGE_MODEL:fal-ai/flux/schnell}
    scene-model: ${HF_SCENE_MODEL:gemini-2.5-flash}
    text-base-url: ${HF_TEXT_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
    image-base-url: ${HF_IMAGE_BASE_URL:https://fal.run}
    # Fal's FLUX safety classifier false-positives on children's-book aesthetics. Kazka's own
    # ModerationJudgeClient already screens the scene prompt before it reaches Fal, so this is
    # off by default. Set FAL_SAFETY_CHECKER=true to re-enable for defence-in-depth.
    image-safety-checker: ${FAL_SAFETY_CHECKER:false}
    text-temperature: ${HF_TEXT_TEMPERATURE:0.75}
    text-top-p: ${HF_TEXT_TOP_P:0.9}
    # Gemini OpenAI-compat 400s on frequency/presence penalty fields. Default 0.0 = skip-send.
    # Override only when pointed at OpenAI/OpenRouter/Together which do accept them.
    text-frequency-penalty: ${HF_TEXT_FREQUENCY_PENALTY:0.0}
    text-presence-penalty: ${HF_TEXT_PRESENCE_PENALTY:0.0}
    text-max-tokens: ${HF_TEXT_MAX_TOKENS:4096}
    editor-temperature: ${HF_EDITOR_TEMPERATURE:0.3}
    editor-top-p: ${HF_EDITOR_TOP_P:0.9}
    editor-frequency-penalty: ${HF_EDITOR_FREQUENCY_PENALTY:0.0}
    editor-presence-penalty: ${HF_EDITOR_PRESENCE_PENALTY:0.0}
    editor-max-tokens: ${HF_EDITOR_MAX_TOKENS:4096}
  uploads:
    dir: ${UPLOADS_DIR:./uploads}
  storage:
    # "filesystem" (default, local dir served at /uploads) or "r2" (private Cloudflare R2 bucket,
    # browser gets short-lived presigned URLs).
    provider: ${STORAGE_PROVIDER:filesystem}
    r2:
      endpoint: ${R2_ENDPOINT:}
      access-key: ${R2_ACCESS_KEY:}
      secret-key: ${R2_SECRET_KEY:}
      bucket: ${R2_BUCKET:}
      presign-ttl: ${R2_PRESIGN_TTL:12h}
  moderation:
    judge-model: ${MODERATION_MODEL:gemini-2.5-flash}
    judge-base-url: ${MODERATION_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
    judge-timeout: 5s
    suspension-threshold: 3
    suspension-window: 24h
    retention-days: 90
    cache-ttl: 1h
    safe-fallback-scene: "two friends in a sunlit forest at sunset"
  auth:
    app-base-url: ${APP_BASE_URL}
    mail-from: ${MAIL_FROM:no-reply@kazka.local}
    token-ttl:
      email-verification: 24h
      password-reset: 1h
    admin:
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
    jwt:
      secret: ${KAZKA_JWT_SECRET}
      access-ttl: 1h
      refresh-ttl: 30d
      issuer: ${KAZKA_JWT_ISSUER:kazka}
    apple:
      team-id: ${APPLE_TEAM_ID:not-configured}
      client-id: ${APPLE_CLIENT_ID:app.kazka.ios}
      web-client-id: ${APPLE_WEB_CLIENT_ID:}
      key-id: ${APPLE_KEY_ID:not-configured}
      private-key-pem: ${APPLE_PRIVATE_KEY_PEM:}
      jwks-uri: ${APPLE_JWKS_URI:https://appleid.apple.com/auth/keys}
      issuer: ${APPLE_ISSUER:https://appleid.apple.com}
      client-secret-ttl: 1h
    google:
      ios-client-id: ${GOOGLE_IOS_CLIENT_ID:}
      android-client-id: ${GOOGLE_ANDROID_CLIENT_ID:}
      jwks-uri: ${GOOGLE_JWKS_URI:https://www.googleapis.com/oauth2/v3/certs}
      issuer: ${GOOGLE_ISSUER:https://accounts.google.com}
    apns:
      team-id: ${APNS_TEAM_ID:not-configured}
      key-id: ${APNS_KEY_ID:not-configured}
      private-key-pem: ${APNS_PRIVATE_KEY_PEM:}
      bundle-id: ${APNS_BUNDLE_ID:app.kazka.ios}
      apns-host: ${APNS_HOST:api.sandbox.push.apple.com}
      enabled: ${APNS_ENABLED:false}
  billing:
    bundle-id: ${BILLING_BUNDLE_ID:app.kazka.ios}
    app-apple-id: ${BILLING_APP_APPLE_ID:not-configured}
    apple-id: ${BILLING_APPLE_ID:0}
    environment: ${BILLING_ENVIRONMENT:Sandbox}
    issuer-id: ${BILLING_ISSUER_ID:}
    key-id: ${BILLING_KEY_ID:}
    private-key-pem: ${BILLING_PRIVATE_KEY_PEM:}
    enabled: ${BILLING_ENABLED:false}
    free-monthly-story-limit: ${BILLING_FREE_LIMIT:3}
    paddle:
      api-key: ${PADDLE_API_KEY:}
      webhook-secret: ${PADDLE_WEBHOOK_SECRET:}
      environment: ${PADDLE_ENVIRONMENT:sandbox}
    liqpay:
      public-key: ${LIQPAY_PUBLIC_KEY:}
      private-key: ${LIQPAY_PRIVATE_KEY:}
    monobank:
      token: ${MONOBANK_TOKEN:}
      webhook-public-key: ${MONOBANK_WEBHOOK_PUBLIC_KEY:}
    success-url: ${BILLING_SUCCESS_URL:http://localhost:5173/subscription/success}
    cancel-url:  ${BILLING_CANCEL_URL:http://localhost:5173/pricing?cancelled=1}

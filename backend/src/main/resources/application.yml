spring:
  application:
    name: kazkar
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/kazkar}
    username: ${DB_USER:kazkar}
    password: ${DB_PASS:kazkar}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  session:
    store-type: redis
    timeout: 14d
    redis:
      namespace: kazka:session
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:not-configured}
            client-secret: ${GOOGLE_CLIENT_SECRET:not-configured}
            scope: openid,email,profile
server:
  port: 8080
  reactive:
    session:
      cookie:
        same-site: lax
        secure: ${COOKIE_SECURE:false}
        http-only: true
kazka:
  huggingface:
    api-token: ${HUGGINGFACE_API_TOKEN:}
    text-model: ${HF_TEXT_MODEL:INSAIT-Institute/MamayLM-Gemma-3-12B-IT-v1.0:featherless-ai}
    editor-model: ${HF_EDITOR_MODEL:INSAIT-Institute/MamayLM-Gemma-3-12B-IT-v1.0:featherless-ai}
    image-model: ${HF_IMAGE_MODEL:black-forest-labs/FLUX.1-schnell}
    scene-model: ${HF_SCENE_MODEL:Qwen/Qwen3-32B}
    text-base-url: ${HF_TEXT_BASE_URL:https://router.huggingface.co}
    image-base-url: ${HF_IMAGE_BASE_URL:https://router.huggingface.co}
  uploads:
    dir: ${UPLOADS_DIR:./uploads}
  moderation:
    judge-model: ${MODERATION_MODEL:Qwen/Qwen3-32B}
    judge-base-url: ${MODERATION_BASE_URL:https://router.huggingface.co}
    judge-timeout: 5s
    suspension-threshold: 3
    suspension-window: 24h
    retention-days: 90
    cache-ttl: 1h
    safe-fallback-scene: "two friends in a sunlit forest at sunset"
  auth:
    app-base-url: ${APP_BASE_URL:http://localhost}
    mail-from: ${MAIL_FROM:no-reply@kazka.local}
    token-ttl:
      email-verification: 24h
      password-reset: 1h
    admin:
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
    jwt:
      secret: ${KAZKA_JWT_SECRET:dev-only-secret-please-rotate-in-production-min-32-chars}
      access-ttl: 1h
      refresh-ttl: 30d
      issuer: ${KAZKA_JWT_ISSUER:kazka}
    apple:
      team-id: ${APPLE_TEAM_ID:not-configured}
      client-id: ${APPLE_CLIENT_ID:app.kazka.ios}
      key-id: ${APPLE_KEY_ID:not-configured}
      private-key-pem: ${APPLE_PRIVATE_KEY_PEM:}
      jwks-uri: ${APPLE_JWKS_URI:https://appleid.apple.com/auth/keys}
      issuer: ${APPLE_ISSUER:https://appleid.apple.com}
      client-secret-ttl: 1h

spring:
  datasource:
    url: jdbc:tc:mysql:8:///kazkar_test
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  session:
    store-type: redis
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:3025}
    username: ""
    password: ""
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
      mail.smtp.starttls.required: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
kazka:
  huggingface:
    api-token: test-token
  moderation:
    judge-model: Qwen/Qwen3-32B
    judge-base-url: http://localhost:0
    judge-timeout: 2s
    suspension-threshold: 3
    suspension-window: 24h
    retention-days: 90
    cache-ttl: 1h
    safe-fallback-scene: "two friends in a sunlit forest at sunset"
  auth:
    app-base-url: http://localhost
    mail-from: test@kazka.local
    token-ttl:
      email-verification: 24h
      password-reset: 1h
    admin:
      email: ""
      password: ""

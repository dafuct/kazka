spring:
  datasource:
    url: jdbc:tc:mysql:8:///kazkar_test
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  session:
    store-type: redis
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:3025}
    username: ""
    password: ""
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
      mail.smtp.starttls.required: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
kazka:
  rate-limit:
    enabled: false
  ai:
    api-token: test-token
  moderation:
    judge-model: Qwen/Qwen3-32B
    judge-base-url: http://localhost:0
    judge-timeout: 2s
    suspension-threshold: 3
    suspension-window: 24h
    retention-days: 90
    cache-ttl: 1h
    safe-fallback-scene: "two friends in a sunlit forest at sunset"
  auth:
    app-base-url: http://localhost
    mail-from: test@kazka.local
    token-ttl:
      email-verification: 24h
      password-reset: 1h
    admin:
      email: ""
      password: ""
    jwt:
      secret: test-secret-32-characters-minimum-for-hs256-signing-ok
      access-ttl: 5m
      refresh-ttl: 1h
      issuer: kazka-test
    apple:
      team-id: TEST-TEAM
      client-id: app.kazka.ios.test
      key-id: TEST-KEY
      private-key-pem: ""
      jwks-uri: http://localhost:0
      issuer: https://appleid.apple.com
      client-secret-ttl: 1m
    google:
      ios-client-id: ios.test.googleusercontent.com
      android-client-id: ""
      jwks-uri: http://localhost:0
      issuer: https://accounts.google.com
    apns:
      team-id: TEST-TEAM
      key-id: TEST-KEY
      private-key-pem: ""
      bundle-id: app.kazka.ios.test
      apns-host: http://localhost:0
      enabled: false
  billing:
    bundle-id: app.kazka.ios.test
    app-apple-id: ""
    apple-id: 0
    environment: Sandbox
    issuer-id: ""
    key-id: ""
    private-key-pem: ""
    enabled: false
    free-monthly-story-limit: 3
    paypro:
      vendor-id: 1
      api-key: "test-api-key"
      ipn-secret: "test-validation-key"
      use-test-mode: true
    monobank:
      token: ""
      recurring:
        tick-interval: PT24H
        grace-max-retries: 3
        idempotency-prefix: renew-
    success-url: http://localhost:5173/subscription/success
    cancel-url: http://localhost:5173/pricing?cancelled=1
